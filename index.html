<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>追光地图网页版</title>
  <style>
    :root {
      --bg: #f7faf8;
      --panel: #ffffff;
      --text: #17211d;
      --muted: #65736d;
      --soft: #e6eee9;
      --line: #d9e4de;
      --primary: #087f7a;
      --primary-strong: #075e5a;
      --primary-soft: #e2f5f2;
      --accent: #2457a7;
      --shadow: 0 18px 50px rgba(23, 33, 29, 0.10);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(226, 245, 242, 0.9), rgba(247, 250, 248, 0) 320px),
        var(--bg);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .app-shell {
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      border-bottom: 1px solid rgba(217, 228, 222, 0.9);
      background: rgba(247, 250, 248, 0.92);
      backdrop-filter: blur(18px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 154px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
    }

    .nav button {
      border: 0;
      border-radius: 999px;
      padding: 8px 14px;
      background: transparent;
      color: var(--muted);
      white-space: nowrap;
    }

    .nav button.active {
      background: var(--text);
      color: #fff;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 154px;
      justify-content: flex-end;
    }

    .ghost-button,
    .primary-button,
    .icon-button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      min-height: 40px;
      padding: 0 14px;
    }

    .primary-button {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .primary-button:hover {
      background: var(--primary-strong);
    }

    .icon-button {
      display: inline-grid;
      place-items: center;
      width: 40px;
      padding: 0;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 42px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: 22px;
      align-items: stretch;
      margin-bottom: 22px;
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 360px;
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      max-width: 720px;
      margin-top: 12px;
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .lead {
      max-width: 700px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 28px;
    }

    .stat {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f9fcfa;
    }

    .stat strong {
      display: block;
      font-size: 26px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .hero-photo {
      position: relative;
      overflow: hidden;
      min-height: 360px;
      border-radius: var(--radius);
      background: #dbe9e4;
      box-shadow: var(--shadow);
    }

    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-photo-note {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      padding: 16px;
      border-radius: var(--radius);
      color: #fff;
      background: rgba(10, 24, 21, 0.72);
      backdrop-filter: blur(12px);
    }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 8px 30px rgba(23, 33, 29, 0.06);
    }

    .filters {
      position: sticky;
      top: 82px;
      padding: 16px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .search-input,
    .select,
    .textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    .textarea {
      min-height: 102px;
      padding: 12px;
      resize: vertical;
    }

    .search-input:focus,
    .select:focus,
    .textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(8, 127, 122, 0.12);
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      padding: 8px 11px;
      font-size: 13px;
    }

    .chip.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: var(--primary-strong);
      font-weight: 700;
    }

    .filter-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 16px;
    }

    .section-toolbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 24px;
      line-height: 1.2;
    }

    .muted {
      color: var(--muted);
    }

    .spot-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .spot-card {
      overflow: hidden;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .spot-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .spot-media {
      position: relative;
      height: 178px;
      overflow: hidden;
      background: var(--soft);
    }

    .spot-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .spot-badge,
    .spot-score {
      position: absolute;
      top: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      color: #fff;
      background: rgba(10, 24, 21, 0.76);
      font-size: 12px;
      backdrop-filter: blur(8px);
    }

    .spot-badge {
      left: 12px;
    }

    .spot-score {
      right: 12px;
    }

    .spot-body {
      padding: 14px;
    }

    .spot-city {
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
    }

    .spot-name {
      margin-top: 5px;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.3;
    }

    .spot-summary {
      display: -webkit-box;
      min-height: 64px;
      margin-top: 9px;
      overflow: hidden;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .tag-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .tag {
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary-strong);
      padding: 5px 8px;
      font-size: 12px;
    }

    .card-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 13px;
    }

    .text-button {
      border: 0;
      background: transparent;
      color: var(--primary);
      font-weight: 800;
      padding: 4px 0;
    }

    .favorite-button.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: var(--primary-strong);
    }

    .load-more {
      display: flex;
      justify-content: center;
      margin-top: 18px;
    }

    .empty {
      padding: 32px;
      text-align: center;
    }

    .collection-grid,
    .pose-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .pose-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .pose-card img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      background: var(--soft);
    }

    .pose-card div {
      padding: 12px;
    }

    .caption-layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .caption-list {
      display: grid;
      gap: 12px;
    }

    .caption-card {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .caption-card p {
      line-height: 1.8;
    }

    .detail-drawer {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      background: rgba(12, 18, 16, 0.46);
    }

    .detail-drawer.active {
      display: block;
    }

    .detail-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: min(760px, 100%);
      height: 100%;
      overflow-y: auto;
      background: var(--bg);
      box-shadow: -20px 0 50px rgba(0, 0, 0, 0.22);
    }

    .detail-header {
      position: sticky;
      top: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(247, 250, 248, 0.92);
      backdrop-filter: blur(16px);
    }

    .detail-content {
      padding: 18px;
    }

    .detail-hero {
      overflow: hidden;
      margin-bottom: 16px;
    }

    .detail-photo {
      height: 300px;
      background: var(--soft);
    }

    .detail-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .detail-main {
      padding: 18px;
    }

    .detail-main h2 {
      margin-top: 8px;
      font-size: 34px;
      line-height: 1.15;
    }

    .detail-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .meta-box {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .meta-box span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .location-card,
    .note-card {
      padding: 16px;
      margin-bottom: 12px;
    }

    .location-card h3 {
      font-size: 20px;
      margin: 6px 0 8px;
    }

    .location-grid,
    .note-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .mini-box {
      padding: 10px;
      border-radius: var(--radius);
      background: #f9fcfa;
      border: 1px solid var(--line);
      color: var(--muted);
      line-height: 1.55;
    }

    .mini-box strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
    }

    .route-box {
      padding: 16px;
      margin-bottom: 14px;
    }

    .route-nodes {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .route-node {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .route-pin {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      font-weight: 800;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 90;
      display: none;
      transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--text);
      color: #fff;
      box-shadow: var(--shadow);
    }

    .toast.active {
      display: block;
    }

    @media (max-width: 980px) {
      .topbar-inner {
        flex-wrap: wrap;
      }

      .brand,
      .header-actions {
        min-width: 0;
      }

      .nav {
        order: 3;
        width: 100%;
        overflow-x: auto;
        justify-content: flex-start;
      }

      .hero,
      .layout,
      .caption-layout {
        grid-template-columns: 1fr;
      }

      .filters {
        position: static;
      }

      .spot-grid,
      .collection-grid,
      .pose-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      main,
      .topbar-inner {
        width: min(100% - 24px, 1180px);
      }

      .hero-copy {
        min-height: auto;
        padding: 22px;
      }

      .hero-photo {
        min-height: 260px;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .spot-grid,
      .collection-grid,
      .pose-grid {
        grid-template-columns: 1fr;
      }

      .detail-meta,
      .location-grid,
      .note-grid {
        grid-template-columns: 1fr;
      }

      .section-toolbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-mark">光</div>
          <span>追光地图</span>
        </div>
        <nav class="nav" aria-label="页面导航">
          <button class="active" data-view="spots">旅行点位</button>
          <button data-view="poses">姿势库</button>
          <button data-view="captions">文案库</button>
          <button data-view="favorites">收藏</button>
        </nav>
        <div class="header-actions">
          <button class="ghost-button" id="nearbyTopButton">附近推荐</button>
        </div>
      </div>
    </header>

    <main>
      <section class="view active" id="view-spots">
        <div class="hero">
          <div class="hero-copy">
            <div>
              <div class="eyebrow">Chasing Light Journey</div>
              <h1>把旅途的光，落到正确机位</h1>
              <p class="lead">网页版已同步小程序里的城市、地标、小众街区、自然风景和现场拍摄建议。先筛城市与主题，再打开详情照着走、照着拍。</p>
            </div>
            <div class="stats" id="stats"></div>
          </div>
          <figure class="hero-photo">
            <img src="./assets/spots/shanghai-bund-ai.jpg" alt="追光地图城市旅行封面">
            <figcaption class="hero-photo-note">
              <strong>旅行点位档案</strong>
              <p class="muted" style="color: rgba(255,255,255,0.78); margin-top: 6px;">热门路线和小众机位放在同一个浏览器里，适合出发前规划，也适合现场临时补拍。</p>
            </figcaption>
          </figure>
        </div>

        <div class="layout">
          <aside class="filters panel">
            <div class="field">
              <label for="searchInput">搜索</label>
              <input class="search-input" id="searchInput" type="search" placeholder="景点、城市、路线、标签">
            </div>
            <div class="field">
              <label>主题</label>
              <div class="chip-row" id="themeChips"></div>
            </div>
            <div class="field">
              <label for="provinceSelect">省份 / 地区</label>
              <select class="select" id="provinceSelect"></select>
            </div>
            <div class="field">
              <label for="citySelect">城市</label>
              <select class="select" id="citySelect"></select>
            </div>
            <div class="filter-actions">
              <button class="primary-button" id="nearbyButton">按附近排</button>
              <button class="ghost-button" id="resetButton">重置</button>
            </div>
            <p class="muted" id="filterHint" style="margin-top: 12px; font-size: 13px;">正在读取本地精选点位。</p>
          </aside>

          <section>
            <div class="section-toolbar">
              <div>
                <div class="eyebrow">Travel Spots</div>
                <h2 class="section-title">旅行点位</h2>
              </div>
              <div class="muted" id="resultCount"></div>
            </div>
            <div class="spot-grid" id="spotGrid"></div>
            <div class="empty panel" id="emptyState" hidden>
              <h3>没找到匹配点位</h3>
              <p class="muted" style="margin-top: 8px;">换一个城市、主题或关键词试试。</p>
            </div>
            <div class="load-more">
              <button class="ghost-button" id="loadMoreButton">继续显示</button>
            </div>
          </section>
        </div>
      </section>

      <section class="view" id="view-poses">
        <div class="section-toolbar">
          <div>
            <div class="eyebrow">Pose Guide</div>
            <h2 class="section-title">姿势库</h2>
          </div>
          <div class="chip-row" id="poseChips"></div>
        </div>
        <div class="pose-grid" id="poseGrid"></div>
      </section>

      <section class="view" id="view-captions">
        <div class="caption-layout">
          <aside class="panel filters" style="position: static;">
            <div class="eyebrow">Caption Lab</div>
            <h2 class="section-title" style="margin-top: 8px;">文案库</h2>
            <p class="muted" style="margin-top: 10px; line-height: 1.8;">选择风格，或输入地点关键词生成一条可直接复制的旅行文案。</p>
            <div class="field" style="margin-top: 18px;">
              <label>风格</label>
              <div class="chip-row" id="captionChips"></div>
            </div>
            <div class="field">
              <label for="captionKeyword">地点 / 心情关键词</label>
              <input class="search-input" id="captionKeyword" placeholder="例如：西湖日落、海边、Citywalk">
            </div>
            <button class="primary-button" id="generateCaptionButton" style="width: 100%;">生成一条</button>
            <div class="caption-card" id="generatedCaption" style="margin-top: 12px;" hidden></div>
          </aside>
          <section>
            <div class="section-toolbar">
              <div>
                <div class="eyebrow">Ready To Copy</div>
                <h2 class="section-title">可复制文案</h2>
              </div>
            </div>
            <div class="caption-list" id="captionList"></div>
          </section>
        </div>
      </section>

      <section class="view" id="view-favorites">
        <div class="section-toolbar">
          <div>
            <div class="eyebrow">Saved</div>
            <h2 class="section-title">我的收藏</h2>
          </div>
          <div class="muted" id="favoriteCount"></div>
        </div>
        <div class="collection-grid" id="favoriteGrid"></div>
        <div class="empty panel" id="favoriteEmpty" hidden>
          <h3>还没有收藏</h3>
          <p class="muted" style="margin-top: 8px;">在点位卡片或详情里点“收藏”，这里会自动汇总。</p>
        </div>
      </section>
    </main>
  </div>

  <div class="detail-drawer" id="detailDrawer" aria-hidden="true">
    <article class="detail-panel">
      <header class="detail-header">
        <strong>点位详情</strong>
        <button class="icon-button" id="closeDetailButton" aria-label="关闭详情">×</button>
      </header>
      <div class="detail-content" id="detailContent"></div>
    </article>
  </div>

  <div class="toast" id="toast"></div>

  <script src="./web/data.js"></script>
  <script>
    const data = window.ZHUI_GUANG_WEB_DATA || { spots: [], poses: [], captions: {}, stats: {}, provinces: [], cities: [] };
    const state = {
      view: 'spots',
      query: '',
      theme: '全部主题',
      province: '全部',
      city: '全部',
      visible: 24,
      activePoseCategory: '全部',
      activeCaptionStyle: 'literary',
      userLocation: null,
      filtered: []
    };

    const themeFilters = ['全部主题', 'Citywalk', '热门', '小众', '夜景', '亲水', '山野', '古城', '街拍', '人文', '美食'];
    const poseCategories = ['全部'].concat([...new Set(data.poses.map((pose) => pose.category).filter(Boolean))]);
    const captionLabels = {
      literary: '文艺',
      simple: '简洁',
      funny: '松弛',
      elegant: '高级',
      english: '英文'
    };

    const els = {
      navButtons: document.querySelectorAll('.nav button'),
      stats: document.getElementById('stats'),
      themeChips: document.getElementById('themeChips'),
      searchInput: document.getElementById('searchInput'),
      provinceSelect: document.getElementById('provinceSelect'),
      citySelect: document.getElementById('citySelect'),
      spotGrid: document.getElementById('spotGrid'),
      resultCount: document.getElementById('resultCount'),
      loadMoreButton: document.getElementById('loadMoreButton'),
      emptyState: document.getElementById('emptyState'),
      resetButton: document.getElementById('resetButton'),
      nearbyButton: document.getElementById('nearbyButton'),
      nearbyTopButton: document.getElementById('nearbyTopButton'),
      filterHint: document.getElementById('filterHint'),
      poseChips: document.getElementById('poseChips'),
      poseGrid: document.getElementById('poseGrid'),
      captionChips: document.getElementById('captionChips'),
      captionList: document.getElementById('captionList'),
      captionKeyword: document.getElementById('captionKeyword'),
      generateCaptionButton: document.getElementById('generateCaptionButton'),
      generatedCaption: document.getElementById('generatedCaption'),
      favoriteGrid: document.getElementById('favoriteGrid'),
      favoriteEmpty: document.getElementById('favoriteEmpty'),
      favoriteCount: document.getElementById('favoriteCount'),
      detailDrawer: document.getElementById('detailDrawer'),
      detailContent: document.getElementById('detailContent'),
      closeDetailButton: document.getElementById('closeDetailButton'),
      toast: document.getElementById('toast')
    };

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function assetPath(path) {
      if (!path) return '';
      return path.startsWith('/') ? `.${path}` : path;
    }

    function normalize(value) {
      return String(value || '').trim().toLowerCase();
    }

    function getFavorites() {
      try {
        return JSON.parse(localStorage.getItem('zhuiGuangFavorites') || '[]').map(String);
      } catch (error) {
        return [];
      }
    }

    function setFavorites(ids) {
      localStorage.setItem('zhuiGuangFavorites', JSON.stringify(ids));
    }

    function isFavorite(id) {
      return getFavorites().includes(String(id));
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add('active');
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => els.toast.classList.remove('active'), 1800);
    }

    function buildSearchText(spot) {
      const locationText = (spot.locations || []).map((item) => [
        item.name, item.address, item.desc, item.time, item.tip, item.type, item.angle, item.lens,
        item.direction, item.example, item.result, item.stand, item.action, item.cue
      ].join(' ')).join(' ');
      return normalize([
        spot.name, spot.province, spot.city, spot.location, spot.badge, spot.bestTime,
        spot.summary, (spot.tags || []).join(' '), (spot.themeTags || []).join(' '),
        (spot.displayTags || []).join(' '), locationText
      ].join(' '));
    }

    function getDistanceKm(spot) {
      if (!state.userLocation || !spot.lat || !spot.lng) return null;
      const toRad = (value) => value * Math.PI / 180;
      const earthRadiusKm = 6371;
      const deltaLat = toRad(spot.lat - state.userLocation.latitude);
      const deltaLng = toRad(spot.lng - state.userLocation.longitude);
      const lat1 = toRad(state.userLocation.latitude);
      const lat2 = toRad(spot.lat);
      const a = Math.sin(deltaLat / 2) ** 2
        + Math.cos(lat1) * Math.cos(lat2) * Math.sin(deltaLng / 2) ** 2;
      return earthRadiusKm * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatDistance(distanceKm) {
      if (distanceKm === null || Number.isNaN(distanceKm)) return '';
      if (distanceKm < 1) return `${Math.round(distanceKm * 1000)}m`;
      if (distanceKm < 100) return `${distanceKm.toFixed(1)}km`;
      return `${Math.round(distanceKm)}km`;
    }

    function renderStats() {
      const stats = [
        [data.stats.spotCount || data.spots.length, '旅行点位'],
        [data.stats.provinceCount || data.provinces.length, '覆盖省份'],
        [data.stats.cityCount || data.cities.length, '城市地区'],
        [data.stats.angleCount || '', '拍摄角度']
      ];
      els.stats.innerHTML = stats.map(([value, label]) => `
        <div class="stat"><strong>${escapeHtml(value)}</strong><span>${escapeHtml(label)}</span></div>
      `).join('');
    }

    function renderThemeChips() {
      els.themeChips.innerHTML = themeFilters.map((theme) => `
        <button class="chip ${state.theme === theme ? 'active' : ''}" data-theme="${escapeHtml(theme)}">${escapeHtml(theme)}</button>
      `).join('');
    }

    function renderSelectOptions() {
      const provinceOptions = ['全部'].concat(data.provinces);
      els.provinceSelect.innerHTML = provinceOptions.map((province) => `
        <option value="${escapeHtml(province)}" ${state.province === province ? 'selected' : ''}>${escapeHtml(province)}</option>
      `).join('');

      const citySource = state.province === '全部'
        ? data.spots
        : data.spots.filter((spot) => spot.province === state.province);
      const cityOptions = ['全部'].concat([...new Set(citySource.map((spot) => spot.city).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, 'zh-Hans-CN')));
      if (!cityOptions.includes(state.city)) state.city = '全部';
      els.citySelect.innerHTML = cityOptions.map((city) => `
        <option value="${escapeHtml(city)}" ${state.city === city ? 'selected' : ''}>${escapeHtml(city)}</option>
      `).join('');
    }

    function getFilteredSpots() {
      const query = normalize(state.query);
      const matched = data.spots.map((spot) => {
        const distanceKm = getDistanceKm(spot);
        return { spot, distanceKm };
      }).filter(({ spot }) => {
        const text = spot._searchText || (spot._searchText = buildSearchText(spot));
        const matchProvince = state.province === '全部' || spot.province === state.province;
        const matchCity = state.city === '全部' || spot.city === state.city;
        const matchTheme = state.theme === '全部主题' || text.includes(normalize(state.theme));
        return matchProvince && matchCity && matchTheme && (!query || text.includes(query));
      });

      if (state.userLocation) {
        matched.sort((a, b) => {
          const da = a.distanceKm === null ? Infinity : a.distanceKm;
          const db = b.distanceKm === null ? Infinity : b.distanceKm;
          return da - db;
        });
      }

      return matched;
    }

    function renderSpotCard(item) {
      const { spot, distanceKm } = item;
      const cover = assetPath(spot.coverImage || spot.aiExampleImage);
      const tags = (spot.displayTags || spot.themeTags || spot.tags || []).slice(0, 4);
      const favorite = isFavorite(spot.id);
      return `
        <article class="spot-card" data-id="${escapeHtml(spot.id)}">
          <div class="spot-media" style="background: ${escapeHtml(spot.coverStyle || '#e6eee9')};">
            ${cover ? `<img src="${escapeHtml(cover)}" alt="${escapeHtml(spot.name)}" loading="lazy">` : ''}
            <span class="spot-badge">${escapeHtml(spot.badge || spot.imageLabel || '旅行点位')}</span>
            <span class="spot-score">${escapeHtml(spot.score)}${distanceKm !== null ? ` · ${escapeHtml(formatDistance(distanceKm))}` : ''}</span>
          </div>
          <div class="spot-body">
            <div class="spot-city">${escapeHtml(spot.city)} · ${escapeHtml(spot.sourceLabel || '精选')}</div>
            <div class="spot-name">${escapeHtml(spot.name)}</div>
            <p class="spot-summary">${escapeHtml(spot.summary)}</p>
            <div class="tag-strip">${tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}</div>
            <div class="card-actions">
              <button class="text-button" data-action="open" data-id="${escapeHtml(spot.id)}">查看详情</button>
              <button class="ghost-button favorite-button ${favorite ? 'active' : ''}" data-action="favorite" data-id="${escapeHtml(spot.id)}">${favorite ? '已收藏' : '收藏'}</button>
            </div>
          </div>
        </article>
      `;
    }

    function renderSpots() {
      state.filtered = getFilteredSpots();
      const visibleItems = state.filtered.slice(0, state.visible);
      els.spotGrid.innerHTML = visibleItems.map(renderSpotCard).join('');
      els.resultCount.textContent = `显示 ${visibleItems.length} / ${state.filtered.length} 处`;
      els.loadMoreButton.hidden = visibleItems.length >= state.filtered.length;
      els.loadMoreButton.textContent = `继续显示 ${Math.min(24, Math.max(state.filtered.length - visibleItems.length, 0))} 处`;
      els.emptyState.hidden = state.filtered.length > 0;
      els.filterHint.textContent = state.userLocation
        ? '已按当前位置距离排序。'
        : `本地精选点位，数据生成于 ${new Date(data.generatedAt).toLocaleString('zh-CN')}`;
    }

    function toggleFavorite(id) {
      const favorites = getFavorites();
      const key = String(id);
      const next = favorites.includes(key)
        ? favorites.filter((item) => item !== key)
        : favorites.concat(key);
      setFavorites(next);
      showToast(next.includes(key) ? '已收藏' : '已取消收藏');
      renderSpots();
      renderFavorites();
      if (els.detailDrawer.classList.contains('active')) {
        const spot = data.spots.find((item) => String(item.id) === key);
        if (spot) renderDetail(spot);
      }
    }

    function mapUrl(spot, location) {
      const keyword = location && (location.mapKeyword || location.address || location.name)
        ? `${spot.city} ${location.mapKeyword || location.address || location.name}`
        : `${spot.city} ${spot.name}`;
      return `https://uri.amap.com/search?keyword=${encodeURIComponent(keyword)}`;
    }

    function renderRouteMap(routeMap) {
      if (!routeMap || !Array.isArray(routeMap.nodes) || !routeMap.nodes.length) return '';
      return `
        <section class="route-box panel">
          <div class="eyebrow">Citywalk Map</div>
          <h3 style="margin-top: 6px;">${escapeHtml(routeMap.title || '步行路线')}</h3>
          <p class="muted" style="margin-top: 8px;">${escapeHtml(routeMap.start || '')} 到 ${escapeHtml(routeMap.end || '')} · ${escapeHtml(routeMap.distanceText || '')} · ${escapeHtml(routeMap.durationText || '')}</p>
          <div class="route-nodes">
            ${routeMap.nodes.map((node, index) => `
              <div class="route-node">
                <div class="route-pin">${escapeHtml(node.no || index + 1)}</div>
                <div class="mini-box">
                  <strong>${escapeHtml(node.name)}</strong>
                  <div>${escapeHtml(node.type || '')}</div>
                  <div>${escapeHtml(node.desc || '')}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function renderDetail(spot) {
      const cover = assetPath(spot.coverImage || spot.aiExampleImage);
      const favorite = isFavorite(spot.id);
      const tags = (spot.displayTags || spot.themeTags || spot.tags || []).slice(0, 8);
      els.detailContent.innerHTML = `
        <section class="detail-hero panel">
          <div class="detail-photo" style="background: ${escapeHtml(spot.coverStyle || '#e6eee9')};">
            ${cover ? `<img src="${escapeHtml(cover)}" alt="${escapeHtml(spot.name)}">` : ''}
          </div>
          <div class="detail-main">
            <div class="eyebrow">${escapeHtml(spot.archiveNo || 'LOCATION FILE')}</div>
            <h2>${escapeHtml(spot.name)}</h2>
            <p class="lead" style="font-size: 16px;">${escapeHtml(spot.summary)}</p>
            <div class="tag-strip">${tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}</div>
            <div class="detail-meta">
              <div class="meta-box"><span>城市</span><strong>${escapeHtml(spot.city)}</strong></div>
              <div class="meta-box"><span>最佳光线</span><strong>${escapeHtml(spot.bestTime)}</strong></div>
              <div class="meta-box"><span>评分</span><strong>${escapeHtml(spot.score)}</strong></div>
            </div>
            <div class="filter-actions" style="max-width: 360px;">
              <button class="primary-button" data-detail-action="favorite" data-id="${escapeHtml(spot.id)}">${favorite ? '取消收藏' : '收藏机位'}</button>
              <a class="ghost-button" style="display: inline-grid; place-items: center; text-decoration: none;" href="${escapeHtml(mapUrl(spot))}" target="_blank" rel="noreferrer">地图搜索</a>
            </div>
          </div>
        </section>
        ${renderRouteMap(spot.routeMap)}
        <section>
          <div class="section-toolbar">
            <div>
              <div class="eyebrow">How To Shoot</div>
              <h2 class="section-title">推荐机位</h2>
            </div>
            <div class="muted">${(spot.locations || []).length} 处</div>
          </div>
          ${(spot.locations || []).map((location, index) => `
            <article class="location-card panel">
              <div class="eyebrow">0${index + 1} · ${escapeHtml(location.type || '机位')} · ${escapeHtml(location.time || '')}</div>
              <h3>${escapeHtml(location.name)}</h3>
              <p class="muted">${escapeHtml(location.desc)}</p>
              ${location.address ? `<p style="margin-top: 10px;"><strong>导航：</strong>${escapeHtml(location.address)}</p>` : ''}
              <div class="location-grid">
                <div class="mini-box"><strong>拍出来</strong>${escapeHtml(location.result || location.example || '保留地点信息和人物状态。')}</div>
                <div class="mini-box"><strong>人站哪</strong>${escapeHtml(location.stand || location.direction || '人物放在画面边缘，给主体留空间。')}</div>
                <div class="mini-box"><strong>怎么拍</strong>${escapeHtml(location.action || location.tip || '先拍空景确认构图，再让人物进入画面。')}</div>
              </div>
              <div class="location-grid">
                <div class="mini-box"><strong>构图</strong>${escapeHtml(location.angle || '根据现场线条找前景和纵深。')}</div>
                <div class="mini-box"><strong>镜头</strong>${escapeHtml(location.lens || '1x 标准镜头优先。')}</div>
                <div class="mini-box"><strong>提示</strong>${escapeHtml(location.tip || '')}</div>
              </div>
              <a class="primary-button" style="display: inline-grid; place-items: center; margin-top: 12px; text-decoration: none;" href="${escapeHtml(mapUrl(spot, location))}" target="_blank" rel="noreferrer">打开地图搜索</a>
            </article>
          `).join('')}
        </section>
        <section class="note-grid">
          <div class="note-card panel">
            <div class="eyebrow">Tips</div>
            <h3 style="margin: 8px 0 12px;">避坑提示</h3>
            ${(spot.tips || []).map((tip, index) => `<p class="mini-box"><strong>0${index + 1}</strong>${escapeHtml(tip)}</p>`).join('')}
          </div>
          <div class="note-card panel">
            <div class="eyebrow">Composition</div>
            <h3 style="margin: 8px 0 12px;">构图技巧</h3>
            ${(spot.composition || []).map((tip, index) => `<p class="mini-box"><strong>0${index + 1}</strong>${escapeHtml(tip)}</p>`).join('')}
          </div>
        </section>
      `;
    }

    function openDetail(id) {
      const spot = data.spots.find((item) => String(item.id) === String(id));
      if (!spot) return;
      renderDetail(spot);
      els.detailDrawer.classList.add('active');
      els.detailDrawer.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeDetail() {
      els.detailDrawer.classList.remove('active');
      els.detailDrawer.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function renderPoseChips() {
      els.poseChips.innerHTML = poseCategories.map((category) => `
        <button class="chip ${state.activePoseCategory === category ? 'active' : ''}" data-pose-category="${escapeHtml(category)}">${escapeHtml(category)}</button>
      `).join('');
    }

    function renderPoses() {
      const poses = state.activePoseCategory === '全部'
        ? data.poses
        : data.poses.filter((pose) => pose.category === state.activePoseCategory);
      els.poseGrid.innerHTML = poses.map((pose) => `
        <article class="pose-card">
          <img src="${escapeHtml(assetPath(pose.image))}" alt="${escapeHtml(pose.title)}" loading="lazy">
          <div>
            <div class="eyebrow">${escapeHtml(pose.no || pose.category)}</div>
            <h3 style="margin-top: 6px;">${escapeHtml(pose.title)}</h3>
            <p class="muted" style="margin-top: 6px;">${escapeHtml(pose.desc)}</p>
            <p class="muted" style="margin-top: 6px;">${escapeHtml(pose.scene)}</p>
          </div>
        </article>
      `).join('');
    }

    function renderCaptionChips() {
      const styles = Object.keys(data.captions);
      els.captionChips.innerHTML = styles.map((style) => `
        <button class="chip ${state.activeCaptionStyle === style ? 'active' : ''}" data-caption-style="${escapeHtml(style)}">${escapeHtml(captionLabels[style] || style)}</button>
      `).join('');
    }

    function captionCard(text) {
      return `
        <article class="caption-card">
          <p>${escapeHtml(text)}</p>
          <button class="text-button" data-copy="${escapeHtml(text)}">复制</button>
        </article>
      `;
    }

    function renderCaptions() {
      const captions = data.captions[state.activeCaptionStyle] || [];
      els.captionList.innerHTML = captions.map(captionCard).join('');
    }

    function generateCaption() {
      const keyword = els.captionKeyword.value.trim();
      const captions = data.captions[state.activeCaptionStyle] || [];
      const base = captions[Math.floor(Math.random() * captions.length)] || '把今天的光，留在相册里。';
      const text = keyword ? `${keyword}\n${base}` : base;
      els.generatedCaption.hidden = false;
      els.generatedCaption.innerHTML = `<p>${escapeHtml(text).replace(/\n/g, '<br>')}</p><button class="text-button" data-copy="${escapeHtml(text)}">复制</button>`;
    }

    function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => showToast('已复制'));
        return;
      }
      const textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      textarea.remove();
      showToast('已复制');
    }

    function renderFavorites() {
      const ids = getFavorites();
      const spots = ids.map((id) => data.spots.find((spot) => String(spot.id) === id)).filter(Boolean);
      els.favoriteGrid.innerHTML = spots.map((spot) => renderSpotCard({ spot, distanceKm: getDistanceKm(spot) })).join('');
      els.favoriteEmpty.hidden = spots.length > 0;
      els.favoriteCount.textContent = `${spots.length} 处`;
    }

    function setView(view) {
      state.view = view;
      document.querySelectorAll('.view').forEach((node) => node.classList.toggle('active', node.id === `view-${view}`));
      els.navButtons.forEach((button) => button.classList.toggle('active', button.dataset.view === view));
      if (view === 'poses') renderPoses();
      if (view === 'captions') renderCaptions();
      if (view === 'favorites') renderFavorites();
    }

    function useNearby() {
      if (!navigator.geolocation) {
        showToast('当前浏览器不支持定位');
        return;
      }
      els.filterHint.textContent = '正在请求浏览器定位权限...';
      navigator.geolocation.getCurrentPosition((position) => {
        state.userLocation = {
          latitude: position.coords.latitude,
          longitude: position.coords.longitude
        };
        state.visible = 24;
        renderSpots();
        setView('spots');
        showToast('已按当前位置排序');
      }, () => {
        els.filterHint.textContent = '未开启定位，可继续手动筛选城市。';
        showToast('未开启定位');
      }, {
        enableHighAccuracy: false,
        timeout: 8000
      });
    }

    function bindEvents() {
      els.navButtons.forEach((button) => {
        button.addEventListener('click', () => setView(button.dataset.view));
      });

      els.themeChips.addEventListener('click', (event) => {
        const button = event.target.closest('[data-theme]');
        if (!button) return;
        state.theme = button.dataset.theme;
        state.visible = 24;
        renderThemeChips();
        renderSpots();
      });

      els.searchInput.addEventListener('input', (event) => {
        state.query = event.target.value;
        state.visible = 24;
        renderSpots();
      });

      els.provinceSelect.addEventListener('change', (event) => {
        state.province = event.target.value;
        state.city = '全部';
        state.visible = 24;
        renderSelectOptions();
        renderSpots();
      });

      els.citySelect.addEventListener('change', (event) => {
        state.city = event.target.value;
        state.visible = 24;
        renderSpots();
      });

      els.loadMoreButton.addEventListener('click', () => {
        state.visible += 24;
        renderSpots();
      });

      els.resetButton.addEventListener('click', () => {
        state.query = '';
        state.theme = '全部主题';
        state.province = '全部';
        state.city = '全部';
        state.userLocation = null;
        state.visible = 24;
        els.searchInput.value = '';
        renderThemeChips();
        renderSelectOptions();
        renderSpots();
      });

      els.nearbyButton.addEventListener('click', useNearby);
      els.nearbyTopButton.addEventListener('click', useNearby);

      document.body.addEventListener('click', (event) => {
        const actionButton = event.target.closest('[data-action]');
        if (actionButton) {
          event.stopPropagation();
          const id = actionButton.dataset.id;
          if (actionButton.dataset.action === 'open') openDetail(id);
          if (actionButton.dataset.action === 'favorite') toggleFavorite(id);
          return;
        }

        const card = event.target.closest('.spot-card');
        if (card && card.dataset.id) {
          openDetail(card.dataset.id);
          return;
        }

        const copyButton = event.target.closest('[data-copy]');
        if (copyButton) {
          copyText(copyButton.dataset.copy);
          return;
        }

        const detailFavorite = event.target.closest('[data-detail-action="favorite"]');
        if (detailFavorite) {
          toggleFavorite(detailFavorite.dataset.id);
        }
      });

      els.poseChips.addEventListener('click', (event) => {
        const button = event.target.closest('[data-pose-category]');
        if (!button) return;
        state.activePoseCategory = button.dataset.poseCategory;
        renderPoseChips();
        renderPoses();
      });

      els.captionChips.addEventListener('click', (event) => {
        const button = event.target.closest('[data-caption-style]');
        if (!button) return;
        state.activeCaptionStyle = button.dataset.captionStyle;
        renderCaptionChips();
        renderCaptions();
      });

      els.generateCaptionButton.addEventListener('click', generateCaption);
      els.closeDetailButton.addEventListener('click', closeDetail);
      els.detailDrawer.addEventListener('click', (event) => {
        if (event.target === els.detailDrawer) closeDetail();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeDetail();
      });
    }

    function init() {
      renderStats();
      renderThemeChips();
      renderSelectOptions();
      renderPoseChips();
      renderCaptionChips();
      renderSpots();
      renderFavorites();
      bindEvents();
    }

    init();
  </script>
</body>
</html>
